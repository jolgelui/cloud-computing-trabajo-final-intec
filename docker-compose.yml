services:
  postgres:
    image: postgres:16-alpine
    container_name: proyecto_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: ${POSTGRES_DB:-proyecto}
    ports:
      # Host 5433 avoids conflict with a local Postgres on 5432
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./data/sample_transacciones.csv:/seed/sample_transacciones.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  api:
    build: ./api
    image: proyecto-api:latest
    container_name: proyecto_api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev}@postgres:5432/${POSTGRES_DB:-proyecto}
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ./app
      args:
        VITE_API_BASE: /api
    image: proyecto-app:latest
    container_name: proyecto_app
    ports:
      # Host 8081 avoids conflict with other services on 8080
      - "${APP_PORT:-8081}:80"
    depends_on:
      - api

volumes:
  postgres_data:
